


name: Docker build-push

on:
  push:
    

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v5


      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ vars.DOCKER_TOKEN }}

      - name: Docker build and push the image
        uses: docker/build-push-action@v5
        with:
          context: nodejs-getting-started/Dockerfile
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/node-js nodejs-getting-started/Dockerfile:latest


